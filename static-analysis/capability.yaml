name: static-analysis
version: "1.0.0"
description: >
  Static code analysis capability using Semgrep and CodeQL. Runs parallel
  Semgrep scans across configurable policy groups (crypto, auth, injection,
  secrets, XSS, SSRF, deserialization, path traversal), validates and merges
  SARIF outputs, and generates aggregated scan metrics.

