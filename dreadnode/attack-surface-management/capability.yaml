schema: 1
name: attack-surface-management
version: "1.0.0"
description: >
  External attack surface management with BBOT reconnaissance scanning,
  Neo4j graph database analysis, Shodan internet intelligence, and
  autonomous OODA-loop driven asset discovery. Covers subdomain
  enumeration, web scanning, cloud resource discovery, technology
  fingerprinting, vulnerability detection, screenshot triage, and
  CVE/exploit correlation. Includes Cypher query playbooks for
  graph-based infrastructure mapping and threat prioritization.

mcp:
  servers:
    bbot:
      command: "uv"
      args:
        - "run"
        - "${CAPABILITY_ROOT}/mcp/bbot.py"
      env:
        # Neo4j connection. NEO4J_PASSWORD is REQUIRED — the server fails
        # closed on its first connection attempt if unset (no baked-in default).
        NEO4J_URI: "${NEO4J_URI}"
        NEO4J_USER: "${NEO4J_USER}"
        NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
        # Per-Cypher-query wall-clock timeout. Bounds every Neo4j call
        # independently so a runaway query fails fast instead of consuming the
        # full `timeout:` budget below (which exists for `run_bbot_scan`).
        NEO4J_QUERY_TIMEOUT: "60"
        # Subprocess timeout for `bbot` invocations inside the server.
        # Keep aligned with `timeout:` below — both must be raised together
        # if you need to run scans longer than 1 hour.
        BBOT_SCAN_TIMEOUT: "3600"
      # The 1-hour `timeout:` below is sized for `run_bbot_scan`. All other
      # tools are bounded by NEO4J_QUERY_TIMEOUT above (60s by default), so
      # this generous ceiling is not their effective limit.
      init_timeout: 60
      timeout: 3600
    shodan:
      command: "uv"
      args:
        - "run"
        - "${CAPABILITY_ROOT}/mcp/shodan.py"
      env:
        SHODAN_API_KEY: "${SHODAN_API_KEY}"
      init_timeout: 30

author:
  name: Dreadnode
  url: https://dreadnode.io
license: MIT
repository: https://github.com/dreadnode/capabilities
keywords:
  - attack-surface-management
  - reconnaissance
  - bbot
  - neo4j
  - shodan
  - subdomain-enumeration
  - asset-discovery
  - vulnerability-intelligence
