schema: 1
name: attack-surface-management
version: "1.0.0"
description: >
  External attack surface management with BBOT reconnaissance scanning,
  Neo4j graph database analysis, and autonomous OODA-loop driven asset
  discovery. Covers subdomain enumeration, web scanning, cloud resource
  discovery, technology fingerprinting, vulnerability detection, and
  screenshot triage. Includes Cypher query playbooks for graph-based
  infrastructure mapping and threat prioritization.

mcp:
  servers:
    bbot:
      command: "uv"
      args:
        - "run"
        - "${CAPABILITY_ROOT}/mcp/bbot.py"
      init_timeout: 60
      timeout: 3600

author:
  name: Dreadnode
  url: https://dreadnode.io
license: MIT
repository: https://github.com/dreadnode/capabilities
keywords:
  - attack-surface-management
  - reconnaissance
  - bbot
  - neo4j
  - subdomain-enumeration
  - asset-discovery
