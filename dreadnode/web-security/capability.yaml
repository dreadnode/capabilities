schema: 1
name: web-security
version: "1.0.2"
description: >
  Web application penetration testing with 30+ attack technique playbooks
  covering request smuggling, cache poisoning, SSRF, SSTI, DOM
  vulnerabilities, authentication bypasses, parser differentials, and
  client-side attacks. Includes HTTP client tooling, Caido proxy
  integration via MCP, credential management, DNS rebinding, and
  vulnerability verification.

mcp:
  servers:
    caido:
      command: "uv"
      args:
        - "run"
        - "${CAPABILITY_ROOT}/mcp/caido.py"
      init_timeout: 60
    jxscout:
      command: "uv"
      args:
        - "run"
        - "${CAPABILITY_ROOT}/mcp/jxscout.py"
      init_timeout: 60
    thermoptic:
      command: "uv"
      args:
        - "run"
        - "${CAPABILITY_ROOT}/mcp/thermoptic.py"
      init_timeout: 60
    burp:
      url: "http://127.0.0.1:9876/"
      init_timeout: 15
      timeout: 3600

author:
  name: Dreadnode
  url: https://dreadnode.io
license: MIT
repository: https://github.com/dreadnode/capabilities
keywords:
  - web-security
  - penetration-testing
  - request-smuggling
  - cache-poisoning
  - dns-rebinding
  - dom-security
