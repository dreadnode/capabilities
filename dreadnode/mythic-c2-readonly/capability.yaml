schema: 1
name: mythic-c2-readonly
version: "1.0.0"
description: >
  Read-only Mythic C2 integration. Query callbacks, task history (command
  input/output), credentials, downloaded files, artifacts, keylogs,
  screenshots, processes, file browser data, and tokens without executing
  any commands or modifying Mythic state.

mcp:
  servers:
    mythic:
      command: "uv"
      args: ["run", "${CAPABILITY_ROOT}/mcp/server.py"]
      init_timeout: 30
      env:
        MYTHIC_SERVER_IP: "${MYTHIC_SERVER_IP:-}"
        MYTHIC_SERVER_PORT: "${MYTHIC_SERVER_PORT:-}"
        MYTHIC_USERNAME: "${MYTHIC_USERNAME:-}"
        MYTHIC_PASSWORD: "${MYTHIC_PASSWORD:-}"
        MYTHIC_API_TOKEN: "${MYTHIC_API_TOKEN:-}"
        MYTHIC_TIMEOUT: "${MYTHIC_TIMEOUT:-}"

author:
  name: Dreadnode
  url: https://dreadnode.io
license: MIT
repository: https://github.com/dreadnode/capabilities
keywords:
  - c2
  - mythic
  - read-only
  - reporting
