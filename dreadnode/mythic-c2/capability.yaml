schema: 1
name: mythic-c2
version: "2.0.0"
description: >
  Mythic C2 integration. Read-only observation (callbacks, tasks,
  credentials, files, artifacts, keylogs, screenshots, processes, tokens,
  BloodHound discovery, operation summaries) plus optional Apollo
  post-exploitation (execution, token manipulation, registry, lateral
  movement, SharpHound). A reactor worker watches completed tasks and
  writes AI findings onto Mythic's own surfaces — task comments,
  severity/category tags, and the operation event log.

flags:
  apollo:
    description: Register the Apollo post-exploitation tasking tools alongside the observation surface. Off by default — pull-mode chat runs observation-only.
    default: false

mcp:
  servers:
    mythic:
      command: "uv"
      args: ["run", "${CAPABILITY_ROOT}/mcp_server.py"]
      init_timeout: 30
      env:
        MYTHIC_SERVER_IP: "${MYTHIC_SERVER_IP:-}"
        MYTHIC_SERVER_PORT: "${MYTHIC_SERVER_PORT:-}"
        MYTHIC_USERNAME: "${MYTHIC_USERNAME:-}"
        MYTHIC_PASSWORD: "${MYTHIC_PASSWORD:-}"
        MYTHIC_API_TOKEN: "${MYTHIC_API_TOKEN:-}"
        MYTHIC_TIMEOUT: "${MYTHIC_TIMEOUT:-}"
        MYTHIC_DATA_DIR: "${MYTHIC_DATA_DIR:-}"

workers:
  task-annotator:
    command: "uv"
    args: ["run", "${CAPABILITY_ROOT}/task_annotator.py"]
    env:
      MYTHIC_SERVER_IP: "${MYTHIC_SERVER_IP:-}"
      MYTHIC_SERVER_PORT: "${MYTHIC_SERVER_PORT:-}"
      MYTHIC_USERNAME: "${MYTHIC_USERNAME:-}"
      MYTHIC_PASSWORD: "${MYTHIC_PASSWORD:-}"
      MYTHIC_API_TOKEN: "${MYTHIC_API_TOKEN:-}"
      MYTHIC_TIMEOUT: "${MYTHIC_TIMEOUT:-}"

author:
  name: Dreadnode
  url: https://dreadnode.io
license: MIT
repository: https://github.com/dreadnode/capabilities
keywords:
  - c2
  - mythic
  - post-exploitation
  - implant
  - read-only
  - reporting
