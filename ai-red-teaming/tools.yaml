tools:
  - name: register_assessment
    description: >
      Register a new assessment to track planned attacks against a target.
      Call this before starting any attack workflow to establish the assessment
      context. Returns an assessment ID for subsequent status updates.
    runtime: shell
    entry: scripts/assessment_tracker.py
    parameters:
      type: object
      properties:
        name:
          type: string
          description: Assessment name (e.g., "GPT-4o Safety Audit Q1")
        target:
          type: string
          description: Target model or endpoint description
        planned_attacks:
          type: array
          items:
            type: string
          description: >
            List of attack names to run (e.g., ["tap_attack", "pair_attack", "crescendo_attack"])
        goal:
          type: string
          description: Assessment goal or objective
      required: [name, target, planned_attacks]

  - name: get_assessment_status
    description: >
      Get the current status of the active assessment, including which attacks
      have been planned, completed, and their results summary.
    runtime: shell
    entry: scripts/assessment_tracker.py
    parameters:
      type: object
      properties:
        _unused:
          type: string
          description: "Not used, leave empty"

  - name: update_assessment_status
    description: >
      Update the assessment after an attack completes. Records the attack name,
      success rate (ASR), risk score, and any notes. Call this after each
      attack workflow finishes executing.
    runtime: shell
    entry: scripts/assessment_tracker.py
    parameters:
      type: object
      properties:
        attack_name:
          type: string
          description: Name of the completed attack (e.g., "tap_attack")
        status:
          type: string
          description: "Attack status: completed, failed, or skipped"
          default: completed
        asr:
          type: number
          description: Attack success rate (0.0 to 1.0)
        risk_score:
          type: number
          description: Risk score from analytics (0.0 to 10.0)
        notes:
          type: string
          description: Any relevant notes or observations
      required: [attack_name, status]

  - name: inspect_results
    description: >
      Inspect output files from the ~/workspace/airt/ directory. Reads analytics
      JSON, result files, and reports generated by attack workflows. Use this
      to examine what the SDK produced after running attacks.
    runtime: shell
    entry: scripts/results_inspector.py
    parameters:
      type: object
      properties:
        path:
          type: string
          description: >
            Specific file or directory to inspect within ~/workspace/airt/.
            Defaults to listing all available output files.
        file_type:
          type: string
          description: >
            Filter by file type: "analytics" for JSON analytics, "results" for
            attack results, "reports" for generated reports, or "all" (default).
          default: all

  - name: get_analytics_summary
    description: >
      Extract and summarize key metrics from analytics output files in
      ~/workspace/airt/. Returns ASR, risk score, severity breakdown,
      compliance coverage, and top findings across all completed attacks.
    runtime: shell
    entry: scripts/results_inspector.py
    parameters:
      type: object
      properties:
        attack_name:
          type: string
          description: >
            Filter analytics for a specific attack. Omit to summarize all attacks.

  - name: generate_attack
    description: >
      Generate, save, AND EXECUTE an attack workflow from parameters. Resolves model
      names, attack types, transforms, and scorers automatically. The workflow is
      executed automatically — no need to call execute_workflow separately.
      Returns execution results including trial data and analytics.
    runtime: shell
    entry: scripts/attack_runner.py
    timeout: 600
    parameters:
      type: object
      properties:
        attack_type:
          type: string
          description: >
            Attack name or comma-separated names for campaign.
            Short names: tap, pair, crescendo, goat, prompt, rainbow,
            gptfuzzer/fuzzer, autodan, renellm, beast, drattack, inception.
            Campaign: "tap,pair,crescendo"
        goal:
          type: string
          description: Assessment goal/objective text (passed through as-is)
        goal_category:
          type: string
          description: >
            Category: jailbreak, credential_leak, tool_misuse, system_prompt_leak,
            harmful_content, pii, refusal_bypass, bias, content_policy.
            Default: jailbreak_general
        target_model:
          type: string
          description: >
            Target model. Short names: "gpt-4o", "claude", "gemini", "mistral",
            "groq", "ollama". Or full litellm path like "openai/gpt-4o",
            "anthropic/claude-sonnet-4-20250514", "bedrock/anthropic.claude-sonnet-4-20250514-v1:0"
        attacker_model:
          type: string
          description: Attacker model (defaults to target_model). Same aliases.
        evaluator_model:
          type: string
          description: Evaluator/judge model (defaults to attacker_model). Same aliases.
        transform_model:
          type: string
          description: Model for LLM-powered transforms. Defaults to attacker_model.
        transforms:
          type: array
          items:
            type: string
          description: >
            Transform names. Encoding: base64, hex, leetspeak, morse, binary, url_encode.
            Cipher: caesar, rot13, atbash, vigenere(key). Persuasion: authority, social_proof.
            Stylistic: role_play, ascii_art. Perturbation: typo_insertion, whitespace, zalgo.
            Language (LLM): adapt_language(Zulu), code_switch, dialectal_variation(AAVE).
            MCP: tool_description_poisoning, cross_server_shadowing, rug_pull, schema_poisoning.
            Multi-agent: prompt_infection, peer_agent_spoofing, consensus_poisoning, delegation_exploit.
            Exfiltration: markdown_image_exfil, unicode_tag_exfil, dns_exfil, ssrf_exfil.
            Reasoning: cot_backdoor, reasoning_hijack, reasoning_dos, goal_drift.
            Guardrail: classifier_evasion, payload_split, emoji_smuggle.
            Browser: visual_prompt_injection, ai_clickfix, zombai_c2.
            IDE: ide_command_injection, ide_context_poisoning, code_completion_hijack.
            RAG: rag_context_injection, rag_retrieval_manipulation, rag_knowledge_conflict.
            Agentic: tool_restriction_bypass, agent_memory_injection, agent_goal_hijacking.
            Parameterized: "caesar(5)", "adapt_language(Yoruba)".
        compare_transforms:
          type: boolean
          description: If true + transforms given, runs N+1 study (baseline + each transform).
          default: false
        scorers:
          type: array
          items:
            type: string
          description: >
            Additional scorers. Jailbreak rubrics: rce, data_exfiltration, goal_hijacking,
            memory_poisoning, privilege_escalation, scope_creep, unbounded_agency.
            Agentic: tool_invoked, any_tool_invoked, tool_selection_safety.
            MCP: tool_description_poisoned, cross_server_shadow, rug_pull, schema_poisoned.
            Multi-agent: prompt_infection, agent_spoofing, consensus_poisoned.
            Exfiltration: markdown_exfil, unicode_exfil, dns_exfil, ssrf_exfil.
            Reasoning: cot_backdoor, reasoning_hijack, reasoning_dos, goal_drift.
            IDE: ide_command_injection, ide_context_poisoning, code_completion_hijack.
            Built-in: refusal, json. Or custom rubric text.
        n_iterations:
          type: integer
          description: Max iterations per run. Defaults vary by attack.
        assessment_name:
          type: string
          description: Assessment name. Auto-generated if omitted.
      required: [attack_type, goal, target_model]

  - name: list_goal_categories
    description: >
      List available harm categories and goal counts for red team assessments.
      Returns category slugs, display names, goal counts, and tier info.
      No goal text is returned — only metadata for category selection.
    runtime: shell
    entry: scripts/goal_loader.py
    parameters:
      type: object
      properties:
        _unused:
          type: string
          description: "Not used, leave empty"

  - name: generate_category_attack
    description: >
      Generate, save, AND EXECUTE attacks across harm categories from bundled goal
      dataset. Goals are loaded from a bundled CSV, filtered by category, sampled,
      and embedded in the generated script. Goal text is NEVER returned to the agent.
      The workflow is executed automatically — no need to call execute_workflow.
    runtime: shell
    entry: scripts/attack_runner.py
    timeout: 600
    parameters:
      type: object
      properties:
        categories:
          description: >
            Sub-category slugs to test, or "all" for all sub-categories.
            Safety tier: cybersecurity, weapons, financial_crimes, identity_theft,
            violence, hate_speech, misinformation, self_harm, bias_fairness, content_policy.
            Security tier: credential_extraction, pii_extraction, system_prompt_leak,
            tool_misuse, refusal_bypass.
            Agentic tier: agentic_tool_misuse, agentic_data_exfil, agentic_privilege_escalation,
            agentic_goal_hijacking, agentic_prompt_extraction, agentic_memory_poisoning,
            agentic_code_execution, agentic_supply_chain, agentic_cascading_failure,
            agentic_trust_exploitation.
          oneOf:
            - type: array
              items:
                type: string
            - type: string
              enum: ["all"]
        attacks:
          type: array
          items:
            type: string
          description: >
            Attack types to run against each category.
            Short names: tap, pair, crescendo, goat, prompt, rainbow, fuzzer,
            autodan, renellm, beast, drattack, inception.
        target_model:
          type: string
          description: >
            Target model. Short names: "gpt-4o", "claude", "gemini", "mistral",
            "groq", "ollama". Or full litellm path.
        goals_per_category:
          type: integer
          description: >
            Number of goals to sample per category. Omit to use all goals
            in each category.
        n_iterations:
          type: integer
          description: Max iterations per goal per attack. Defaults vary by attack.
        transforms:
          type: array
          items:
            type: string
          description: Optional transforms to apply to all attacks.
        attacker_model:
          type: string
          description: Attacker model (defaults to target_model). Same aliases.
        evaluator_model:
          type: string
          description: Evaluator/judge model (defaults to attacker_model). Same aliases.
        transform_model:
          type: string
          description: Model for LLM-powered transforms. Defaults to attacker_model.
        assessment_name:
          type: string
          description: Assessment name. Auto-generated if omitted.
      required: [categories, attacks, target_model]

  - name: generate_agentic_attack
    description: >
      Generate, save, AND EXECUTE an attack workflow targeting an external AI agent
      API. The agent is called via HTTP (httpx); responses are parsed with JSONPath
      to extract text content and tool_calls for agentic scoring. The workflow is
      executed automatically. Use this instead of generate_attack when red-teaming
      agents with tools.
    runtime: shell
    entry: scripts/attack_runner.py
    timeout: 600
    parameters:
      type: object
      properties:
        attack_type:
          type: string
          description: >
            Attack name or comma-separated names for campaign.
            Same attacks as generate_attack: tap, pair, crescendo, goat, prompt,
            rainbow, fuzzer, autodan, renellm, beast, drattack, inception.
        goal:
          type: string
          description: Assessment goal/objective text (passed through as-is)
        agent_url:
          type: string
          description: >
            HTTP endpoint of the agent to red-team (e.g., "https://api.example.com/chat").
            The generated script will POST prompts to this URL via httpx.
        agent_auth_type:
          type: string
          description: >
            Authentication method: "bearer" (Authorization: Bearer), "api_key"
            (X-API-Key header), or "none". Default: "none"
          default: none
        agent_auth_env_var:
          type: string
          description: >
            Environment variable name holding the auth credential
            (e.g., "AGENT_API_KEY"). Configure this as a platform secret.
          default: AGENT_API_KEY
        agent_preset:
          type: string
          description: >
            Response format preset: "openai_assistants" ($.choices[0].message),
            "anthropic" ($.content[0]), or "custom" (provide JSONPaths).
          default: custom
        agent_request_template:
          type: string
          description: >
            JSON request body template with {prompt} placeholder.
            Default depends on preset.
        agent_response_text_path:
          type: string
          description: >
            JSONPath to extract text from response. Default depends on preset.
        agent_response_tool_calls_path:
          type: string
          description: >
            JSONPath to extract tool_calls array from response. Default depends on preset.
        agent_dangerous_tools:
          type: array
          items:
            type: string
          description: >
            Tool names the agent should NOT invoke (e.g., ["developer_shell", "exec_command"]).
            Used by agentic scorers to detect unsafe tool invocations.
        agent_safe_tools:
          type: array
          items:
            type: string
          description: >
            Safe alternative tools for comparison scoring (e.g., ["read_file", "search"]).
        attacker_model:
          type: string
          description: >
            Attacker model (REQUIRED for agentic attacks). Same aliases as generate_attack.
        evaluator_model:
          type: string
          description: Evaluator/judge model (defaults to attacker_model). Same aliases.
        transforms:
          type: array
          items:
            type: string
          description: >
            Transform names. Standard transforms plus agentic-specific:
            tool_restriction_bypass, tool_parameter_injection, tool_chain_manipulation,
            agent_memory_injection, agent_context_overflow, agent_goal_hijacking,
            tool_selection_manipulation, tool_output_interpretation_manipulation.
            MCP: tool_description_poisoning, cross_server_shadowing, rug_pull, schema_poisoning.
            Multi-agent: prompt_infection, peer_agent_spoofing, consensus_poisoning, delegation_exploit.
            Browser: visual_prompt_injection, ai_clickfix, zombai_c2.
        scorers:
          type: array
          items:
            type: string
          description: >
            Additional scorers. Agentic: tool_invoked, any_tool_invoked, tool_selection_safety.
            MCP: tool_description_poisoned, cross_server_shadow, rug_pull, schema_poisoned.
            Multi-agent: prompt_infection, agent_spoofing, consensus_poisoned, delegation_exploit.
            Exfiltration: markdown_exfil, unicode_exfil, dns_exfil, ssrf_exfil.
            Reasoning: cot_backdoor, reasoning_hijack, goal_drift.
            Workflow: persistence_detected, lateral_movement_detected, privilege_escalation_detected.
            Standard rubrics: rce, data_exfiltration, goal_hijacking, memory_poisoning.
            Or custom rubric text.
        n_iterations:
          type: integer
          description: Max iterations per run. Defaults vary by attack.
        goal_category:
          type: string
          description: >
            Category slug. Agentic categories: agentic_tool_misuse,
            agentic_data_exfil, agentic_privilege_escalation, agentic_goal_hijacking,
            agentic_prompt_extraction, agentic_memory_poisoning, agentic_code_execution,
            agentic_supply_chain, agentic_cascading_failure, agentic_trust_exploitation.
        assessment_name:
          type: string
          description: Assessment name. Auto-generated if omitted.
      required: [attack_type, goal, agent_url, attacker_model]

  - name: save_workflow
    description: >
      Save a Python workflow script to ~/workspace/airt/workflows/ with syntax
      validation. The script will be compiled with Python's compile() to catch
      syntax errors before saving. Use this to persist generated attack workflows.
    runtime: shell
    entry: scripts/workflow_helper.py
    parameters:
      type: object
      properties:
        filename:
          type: string
          description: >
            Filename for the workflow (e.g., "tap_assessment.py").
            Will be saved to ~/workspace/airt/workflows/<filename>.
        content:
          type: string
          description: Python source code for the workflow
        description:
          type: string
          description: Brief description of what this workflow does
      required: [filename, content]

  - name: execute_workflow
    description: >
      Execute a previously generated workflow script from ~/workspace/airt/workflows/.
      Runs the Python script and returns stdout/stderr output. Use this after
      save_workflow to run scripts that weren't auto-executed.
    runtime: shell
    entry: scripts/workflow_helper.py
    timeout: 600
    parameters:
      type: object
      properties:
        filename:
          type: string
          description: >
            Filename of the workflow to execute (e.g., "tap_assessment.py").
            Must be in ~/workspace/airt/workflows/.
        timeout:
          type: integer
          description: >
            Maximum execution time in seconds (default 300, max 600).
          default: 300
      required: [filename]

  - name: list_workflows
    description: >
      List all saved workflow scripts in ~/workspace/airt/workflows/ with
      their descriptions and modification times.
    runtime: shell
    entry: scripts/workflow_helper.py
    parameters:
      type: object
      properties:
        _unused:
          type: string
          description: "Not used, leave empty"
