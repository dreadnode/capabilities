schema: 1
name: web-security
version: "1.0.0"
description: >
  Web application penetration testing with 30+ attack technique playbooks
  covering request smuggling, cache poisoning, SSRF, SSTI, DOM
  vulnerabilities, authentication bypasses, parser differentials, and
  client-side attacks. Includes HTTP client tooling, Caido proxy
  integration via MCP, credential management, and vulnerability
  verification.

mcp:
  servers:
    caido:
      command: "uv"
      args:
        - "run"
        - "${CAPABILITY_ROOT}/mcp/server.py"
      init_timeout: 60

author:
  name: Dreadnode
  url: https://dreadnode.io
license: Apache-2.0
repository: https://github.com/dreadnode/capabilities
keywords:
  - web-security
  - penetration-testing
  - request-smuggling
  - cache-poisoning
  - dom-security
