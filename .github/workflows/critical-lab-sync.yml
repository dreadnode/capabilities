name: Critical Lab Sync

on:
  schedule:
    - cron: "17 13 * * *"
  workflow_dispatch:
    inputs:
      sections:
        description: "Comma-separated sections to scan"
        required: false
        default: "research"
      max_articles:
        description: "Maximum changed/new articles to process"
        required: false
        default: "10"

concurrency:
  group: critical-lab-sync
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GENERATOR: openrouter/moonshotai/kimi-k2.5,max_tokens=1000,timeout=60
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Run Critical Lab sync
        run: |
          set -euo pipefail
          sections="${{ github.event.inputs.sections || 'research' }}"
          max_articles="${{ github.event.inputs.max_articles || '10' }}"

          uv run \
            --with rigging \
            --with loguru \
            --with beautifulsoup4 \
            python scripts/critical_lab_agent.py \
            --sections "${sections}" \
            --max-articles "${max_articles}" \
            --generator-id "${GENERATOR}" \
            --log-level debug

      - name: Validate capabilities
        run: |
          set -euo pipefail
          failed=0
          for org_dir in dreadnode trailofbits ghostsecurity; do
            if [[ -d "${org_dir}" ]]; then
              echo "==> ${org_dir}/"
              uv run --with dreadnode dreadnode capability validate "${org_dir}" --strict || failed=1
              echo ""
            fi
          done
          [[ "${failed}" -eq 0 ]]

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/critical-lab-sync
          delete-branch: true
          commit-message: "Add Critical Lab skill updates"
          title: "Add Critical Lab skill updates"
          body: |
            Automated Critical Research Lab distillation run.

            This PR was generated from `lab.ctbb.show` content using the Rigging-based sync workflow.
          labels: |
            automation
            research
          add-paths: |
            .automation/critical-lab/**
            dreadnode/web-security/skills/**
