# Security scan skills using cisco-ai-skill-scanner.
#
# Triggers:
#   - Push to main that touches skill/capability files
#   - PR that touches skill/capability files
#   - Manual dispatch (scans all orgs)
#
# Only scans orgs that have changed files, unless manually dispatched.

name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - "dreadnode/**/skills/**"
      - "dreadnode/**/tools/**"
      - "dreadnode/**/agents/**"
      - "dreadnode/**/mcp/**"
      - "dreadnode/**/capability.yaml"
      - "trailofbits/**/skills/**"
      - "trailofbits/**/tools/**"
      - "trailofbits/**/agents/**"
      - "trailofbits/**/mcp/**"
      - "trailofbits/**/capability.yaml"
      - "ghostsecurity/**/skills/**"
      - "ghostsecurity/**/tools/**"
      - "ghostsecurity/**/agents/**"
      - "ghostsecurity/**/mcp/**"
      - "ghostsecurity/**/capability.yaml"
      - "scan-policy.yaml"

  pull_request:
    paths:
      - "dreadnode/**/skills/**"
      - "dreadnode/**/tools/**"
      - "dreadnode/**/agents/**"
      - "dreadnode/**/mcp/**"
      - "dreadnode/**/capability.yaml"
      - "trailofbits/**/skills/**"
      - "trailofbits/**/tools/**"
      - "trailofbits/**/agents/**"
      - "trailofbits/**/mcp/**"
      - "trailofbits/**/capability.yaml"
      - "ghostsecurity/**/skills/**"
      - "ghostsecurity/**/tools/**"
      - "ghostsecurity/**/agents/**"
      - "ghostsecurity/**/mcp/**"
      - "ghostsecurity/**/capability.yaml"
      - "scan-policy.yaml"

  workflow_dispatch:

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  ORG_DIRS: "dreadnode trailofbits ghostsecurity"

jobs:
  # ---------------------------------------------------------------------------
  # Detect which orgs have changed capabilities
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect changed orgs
    runs-on: ubuntu-latest
    outputs:
      orgs: ${{ steps.resolve.outputs.orgs }}
      any_changed: ${{ steps.resolve.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve changed orgs
        id: resolve
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual: scan all orgs
            ORGS=()
            for org_dir in ${ORG_DIRS}; do
              [[ -d "${org_dir}" ]] && ORGS+=("${org_dir}")
            done
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # PR: diff against base
            CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}" HEAD \
              | grep -oP '^[^/]+' | sort -u || true)
            ORGS=()
            for dir in ${CHANGED}; do
              if [[ -d "${dir}" ]] && find "${dir}" -maxdepth 3 -name "SKILL.md" -quit 2>/dev/null | grep -q .; then
                ORGS+=("${dir}")
              fi
            done
          else
            # Push to main: diff against previous commit
            CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" \
              | grep -oP '^[^/]+' | sort -u || true)
            ORGS=()
            for dir in ${CHANGED}; do
              if [[ -d "${dir}" ]] && find "${dir}" -maxdepth 3 -name "SKILL.md" -quit 2>/dev/null | grep -q .; then
                ORGS+=("${dir}")
              fi
            done
          fi

          # If scan-policy.yaml changed, scan everything
          if git diff --name-only "${{ github.event.before || format('origin/{0}', github.base_ref) }}" HEAD 2>/dev/null | grep -q '^scan-policy\.yaml$'; then
            ORGS=()
            for org_dir in ${ORG_DIRS}; do
              [[ -d "${org_dir}" ]] && ORGS+=("${org_dir}")
            done
          fi

          JSON=$(printf '%s\n' "${ORGS[@]:-}" | jq -Rc . | jq -sc .)
          ANY="false"
          [[ ${#ORGS[@]} -gt 0 ]] && ANY="true"

          echo "orgs=${JSON}" >> "$GITHUB_OUTPUT"
          echo "any_changed=${ANY}" >> "$GITHUB_OUTPUT"
          echo "### Security scan: ${#ORGS[@]} org(s) to scan" >> "$GITHUB_STEP_SUMMARY"
          echo "Orgs: ${ORGS[*]:-none}" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Scan changed orgs
  # ---------------------------------------------------------------------------
  scan:
    name: Skill security scan
    needs: detect-changes
    if: needs.detect-changes.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Scan changed orgs
        run: |
          set -euo pipefail
          failed=0
          mkdir -p .sarif

          ORGS_JSON='${{ needs.detect-changes.outputs.orgs }}'
          for org_dir in $(echo "${ORGS_JSON}" | jq -r '.[]'); do
            if [[ ! -d "${org_dir}" ]]; then
              continue
            fi

            skill_count=$(find "${org_dir}" -name "SKILL.md" -type f 2>/dev/null | wc -l | tr -d ' ')
            if [[ "${skill_count}" -eq 0 ]]; then
              echo "==> ${org_dir}/ — no skills, skipping"
              continue
            fi

            echo "==> Scanning ${org_dir}/ (${skill_count} skills)"
            uvx --from cisco-ai-skill-scanner skill-scanner scan-all "${org_dir}" \
              --recursive \
              --lenient \
              --use-behavioral \
              --policy scan-policy.yaml \
              --format summary \
              --format sarif \
              --output-sarif ".sarif/${org_dir}.sarif" \
              --fail-on-severity high \
            || failed=1
            echo ""
          done

          if compgen -G ".sarif/*.sarif" > /dev/null; then
            echo "SARIF reports generated:"
            ls -la .sarif/
          fi

          if [[ "${failed}" -eq 1 ]]; then
            echo "::error::Security scan found HIGH+ severity findings"
            exit 1
          fi

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .sarif/
        continue-on-error: true
