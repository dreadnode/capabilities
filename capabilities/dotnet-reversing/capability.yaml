schema: 1
name: dotnet-reversing
version: "1.0.1"
description: >
  .NET reverse engineering for decompiling and analyzing assemblies
  (.dll, .exe). Provides binary scanning, namespace exploration, type
  decompilation, reference search, and call flow tracing via ILSpy.

author:
  name: Dreadnode
  url: https://dreadnode.io
license: MIT
repository: https://github.com/dreadnode/capabilities
keywords:
  - dotnet
  - reversing
  - decompilation
  - ilspy

dependencies:
  python:
    - "aiohttp>=3.10.0"
    - "loguru>=0.7.0"
