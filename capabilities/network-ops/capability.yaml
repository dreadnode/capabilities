schema: 1
name: network-ops
version: "2.1.2"
description: >
  Network operations and Active Directory exploitation. Multi-agent
  pipeline for autonomous red teaming with Nmap scanning, Netexec
  enumeration, Impacket Kerberos attacks, Certipy AD CS abuse,
  BloodyAD privilege escalation, Krbrelayx relay attacks, and
  password cracking.

author:
  name: Dreadnode
  url: https://dreadnode.io
license: MIT
repository: https://github.com/dreadnode/capabilities

agents:
  - agents/

skills:
  - skills/

tools:
  - tools/

workers:
  coordinator:
    path: workers/coordinator.py

dependencies:
  python:
    - "loguru>=0.7.0"
    - "impacket>=0.12.0"
  scripts:
    - scripts/install_coercion_tools.sh

checks:
  - name: impacket
    command: "python3 -c 'import impacket' 2>/dev/null"
  - name: nmap
    command: "command -v nmap >/dev/null 2>&1"
  - name: petitpotam
    command: "test -f /opt/PetitPotam/PetitPotam.py"
  - name: dfscoerce
    command: "test -f /opt/DFSCoerce/dfscoerce.py"
  - name: shadowcoerce
    command: "test -f /opt/ShadowCoerce/shadowcoerce.py"

keywords:
  - network-ops
  - red-team
  - active-directory
  - penetration-testing
