name: dotnet
version: 1.0.0
description: |
  ## .NET Reverse Engineering

  You have .NET binary analysis tools for decompiling and analyzing .NET assemblies (.dll, .exe).

  ### Analysis Process
  1. Start by scanning for binaries with dotnet_scan_binaries
  2. List namespaces and types to understand structure
  3. Search for interesting patterns (crypto, auth, file, http, sql, exec)
  4. Decompile suspicious types and methods
  5. Trace call flows to understand attack paths

  ### Vulnerability Focus
  - Remote/local code execution
  - Hardcoded credentials and secrets
  - Authentication bypasses
  - Privileged file access
  - Web vulnerabilities and API abuse

  Report exact findings with decompiled source code evidence.

client:
  start: python3 tool.py
  port: 9797
  startupTimeout: 120

tools:
  - name: dotnet_scan_binaries
    description: >
      Scan a directory for .NET binary files (.dll, .exe).
      Returns a list of relative paths to discovered binaries.
      Use this first to find which binaries are available for analysis.
    runtime: http
    endpoint: http://127.0.0.1:9797/tool
    parameters:
      type: object
      properties:
        base_path:
          type: string
          description: Directory to scan for .NET binaries
        pattern:
          type: string
          description: "Glob pattern to filter files (default: **/*)"
      required:
        - base_path

  - name: dotnet_list_namespaces
    description: >
      List all namespaces in a .NET assembly.
      Use this to understand the high-level structure of a binary.
    runtime: http
    endpoint: http://127.0.0.1:9797/tool
    parameters:
      type: object
      properties:
        path:
          type: string
          description: Absolute path to the .NET binary (.dll or .exe)
      required:
        - path

  - name: dotnet_list_types_in_namespace
    description: >
      List all types (classes, structs, interfaces) in a specific namespace.
      Use '<root>' for types without a namespace.
    runtime: http
    endpoint: http://127.0.0.1:9797/tool
    parameters:
      type: object
      properties:
        path:
          type: string
          description: Absolute path to the .NET binary
        namespace:
          type: string
          description: "Namespace to list types from (use '<root>' for root types)"
      required:
        - path
        - namespace

  - name: dotnet_list_types
    description: >
      List all types in a .NET assembly. Returns full type names.
    runtime: http
    endpoint: http://127.0.0.1:9797/tool
    parameters:
      type: object
      properties:
        path:
          type: string
          description: Absolute path to the .NET binary
      required:
        - path

  - name: dotnet_list_methods_in_type
    description: >
      List all methods in a specific type.
      Use the full type name (e.g., "MyNamespace.MyClass").
    runtime: http
    endpoint: http://127.0.0.1:9797/tool
    parameters:
      type: object
      properties:
        path:
          type: string
          description: Absolute path to the .NET binary
        type_name:
          type: string
          description: "Full type name (e.g., 'Namespace.ClassName')"
      required:
        - path
        - type_name

  - name: dotnet_list_methods
    description: >
      List all methods in a .NET assembly. Returns fully qualified method names.
      Warning: can be large for big assemblies.
    runtime: http
    endpoint: http://127.0.0.1:9797/tool
    parameters:
      type: object
      properties:
        path:
          type: string
          description: Absolute path to the .NET binary
      required:
        - path

  - name: dotnet_decompile_module
    description: >
      Decompile an entire .NET module to C# source code.
      Warning: output can be very large. Prefer dotnet_decompile_type for targeted analysis.
    runtime: http
    endpoint: http://127.0.0.1:9797/tool
    parameters:
      type: object
      properties:
        path:
          type: string
          description: Absolute path to the .NET binary
      required:
        - path

  - name: dotnet_decompile_type
    description: >
      Decompile a specific type (class, struct, interface) to C# source code.
      This is the primary tool for reading .NET source code.
    runtime: http
    endpoint: http://127.0.0.1:9797/tool
    parameters:
      type: object
      properties:
        path:
          type: string
          description: Absolute path to the .NET binary
        type_name:
          type: string
          description: "Full type name to decompile (e.g., 'Namespace.ClassName')"
      required:
        - path
        - type_name

  - name: dotnet_decompile_methods
    description: >
      Decompile specific methods by name.
      Returns a map of method full names to their decompiled C# source.
    runtime: http
    endpoint: http://127.0.0.1:9797/tool
    parameters:
      type: object
      properties:
        path:
          type: string
          description: Absolute path to the .NET binary
        method_names:
          type: array
          items:
            type: string
          description: List of method names to decompile
      required:
        - path
        - method_names

  - name: dotnet_search_references
    description: >
      Find all methods in an assembly that reference a search string.
      Searches IL instruction operands — useful for finding uses of specific APIs,
      functions, strings, or patterns in the binary.
    runtime: http
    endpoint: http://127.0.0.1:9797/tool
    parameters:
      type: object
      properties:
        path:
          type: string
          description: Absolute path to the .NET binary
        search:
          type: string
          description: Search string to find in method references
      required:
        - path
        - search

  - name: dotnet_search_by_name
    description: >
      Search for types and methods whose names contain the search string.
      Returns separate lists of matching type names and method names.
    runtime: http
    endpoint: http://127.0.0.1:9797/tool
    parameters:
      type: object
      properties:
        path:
          type: string
          description: Absolute path to the .NET binary
        search:
          type: string
          description: Search string to match against names
      required:
        - path
        - search

  - name: dotnet_get_call_flows
    description: >
      Find all unique call flows leading to a target method across assemblies.
      Returns an array of call paths. Useful for tracing how a vulnerable method is reached.
    runtime: http
    endpoint: http://127.0.0.1:9797/tool
    parameters:
      type: object
      properties:
        paths:
          type: array
          items:
            type: string
          description: Absolute paths to .NET assemblies to search across
        method_name:
          type: string
          description: Target method name to find call flows to
        max_depth:
          type: number
          description: "Maximum call depth (default: 10)"
      required:
        - paths
        - method_name

  - name: dotnet_download_nuget
    description: >
      Download and extract a NuGet package for analysis.
      Returns the path to the extracted package directory.
    runtime: http
    endpoint: http://127.0.0.1:9797/download
    parameters:
      type: object
      properties:
        package:
          type: string
          description: "NuGet package name (e.g., 'Newtonsoft.Json')"
        version:
          type: string
          description: "Specific version (default: latest)"
      required:
        - package

commands:
  - name: dotnet-analyze
    description: Analyze a .NET binary or NuGet package for vulnerabilities
    args: "<path_or_package>"
    prompt: >
      Analyze the .NET target "{{args}}" for security vulnerabilities.

      If it's a file path, scan and analyze the binaries there.
      If it's a NuGet package name, download it first with dotnet_download_nuget,
      then analyze the extracted binaries.

      Focus on: RCE, hardcoded credentials, auth bypasses, and privileged operations.
      Provide detailed findings with decompiled source code evidence and PoCs.
