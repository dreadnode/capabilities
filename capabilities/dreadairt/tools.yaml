tools:
  # ── Assessment Tracker ─────────────────────────────────────────────────────
  - name: register_assessment
    description: >
      Register a new assessment to track planned attacks against a target.
      Call this before starting any attack workflow to establish the assessment
      context. Returns an assessment ID for subsequent status updates.
    runtime: shell
    entry: scripts/assessment_tracker.py
    parameters:
      type: object
      properties:
        name:
          type: string
          description: Assessment name (e.g., "GPT-4o Safety Audit Q1")
        target:
          type: string
          description: Target model or endpoint description
        planned_attacks:
          type: array
          items:
            type: string
          description: >
            List of attack names to run (e.g., ["tap_attack", "pair_attack", "crescendo_attack"])
        goal:
          type: string
          description: Assessment goal or objective
      required: [name, target, planned_attacks]

  - name: get_assessment_status
    description: >
      Get the current status of the active assessment, including which attacks
      have been planned, completed, and their results summary.
    runtime: shell
    entry: scripts/assessment_tracker.py
    parameters:
      type: object
      properties:
        _unused:
          type: string
          description: "Not used, leave empty"

  - name: update_assessment_status
    description: >
      Update the assessment after an attack completes. Records the attack name,
      success rate (ASR), risk score, and any notes. Call this after each
      attack workflow finishes executing.
    runtime: shell
    entry: scripts/assessment_tracker.py
    parameters:
      type: object
      properties:
        attack_name:
          type: string
          description: Name of the completed attack (e.g., "tap_attack")
        status:
          type: string
          description: "Attack status: completed, failed, or skipped"
          default: completed
        asr:
          type: number
          description: Attack success rate (0.0 to 1.0)
        risk_score:
          type: number
          description: Risk score from analytics (0.0 to 10.0)
        notes:
          type: string
          description: Any relevant notes or observations
      required: [attack_name, status]

  # ── Results Inspector ──────────────────────────────────────────────────────
  - name: inspect_results
    description: >
      Inspect output files from the ~/workspace/airt/ directory. Reads analytics
      JSON, result files, and reports generated by attack workflows. Use this
      to examine what the SDK produced after running attacks.
    runtime: shell
    entry: scripts/results_inspector.py
    parameters:
      type: object
      properties:
        path:
          type: string
          description: >
            Specific file or directory to inspect within ~/workspace/airt/.
            Defaults to listing all available output files.
        file_type:
          type: string
          description: >
            Filter by file type: "analytics" for JSON analytics, "results" for
            attack results, "reports" for generated reports, or "all" (default).
          default: all

  - name: get_analytics_summary
    description: >
      Extract and summarize key metrics from analytics output files in
      ~/workspace/airt/. Returns ASR, risk score, severity breakdown,
      compliance coverage, and top findings across all completed attacks.
    runtime: shell
    entry: scripts/results_inspector.py
    parameters:
      type: object
      properties:
        attack_name:
          type: string
          description: >
            Filter analytics for a specific attack. Omit to summarize all attacks.

  # ── Attack Runner ─────────────────────────────────────────────────────────
  - name: generate_attack
    description: >
      Generate and save an attack workflow from parameters. Resolves model names,
      attack types, transforms, and scorers automatically. Returns a bash command
      to execute the workflow. Always use this instead of writing scripts manually.
    runtime: shell
    entry: scripts/attack_runner.py
    parameters:
      type: object
      properties:
        attack_type:
          type: string
          description: >
            Attack name or comma-separated names for campaign.
            Short names work: tap, pair, crescendo, goat, prompt, rainbow,
            gptfuzzer/fuzzer, autodan, renellm, beast, drattack, inception.
            Campaign: "tap,pair,crescendo"
        goal:
          type: string
          description: Assessment goal/objective text (passed through as-is)
        goal_category:
          type: string
          description: >
            Category: jailbreak, credential_leak, tool_misuse, system_prompt_leak,
            harmful_content, pii, refusal_bypass, bias, content_policy.
            Default: jailbreak_general
        target_model:
          type: string
          description: >
            Target model. Short names: "groq", "groq llama", "groq maverick",
            "maverick", "gpt-4o", "claude". Or full litellm path like
            "groq/meta-llama/llama-4-maverick-17b-128e-instruct"
        attacker_model:
          type: string
          description: Attacker model (defaults to target_model). Same aliases.
        evaluator_model:
          type: string
          description: Evaluator/judge model (defaults to attacker_model). Same aliases.
        transform_model:
          type: string
          description: Model for LLM-powered transforms. Defaults to attacker_model.
        transforms:
          type: array
          items:
            type: string
          description: >
            Transform names. Encoding: base64, hex, leetspeak, morse, binary, url_encode.
            Cipher: caesar, rot13, atbash, vigenere(key). Persuasion: authority, social_proof.
            Stylistic: role_play, ascii_art. Perturbation: typo_insertion, whitespace, zalgo.
            Language (LLM): adapt_language(Zulu), adapt_language(Welsh), code_switch, dialectal_variation(AAVE).
            Transliteration: transliterate(cyrillic). Parameterized: "caesar(5)", "adapt_language(Yoruba)".
        compare_transforms:
          type: boolean
          description: If true + transforms given, runs N+1 study (baseline + each transform).
          default: false
        scorers:
          type: array
          items:
            type: string
          description: >
            Additional scorers. Bundled rubrics: rce, data_exfiltration, goal_hijacking,
            memory_poisoning, privilege_escalation, scope_creep, tool_chaining,
            tool_selection_safety, unbounded_agency, web_chatbot_security.
            Built-in: refusal, json. Or custom rubric text.
        n_iterations:
          type: integer
          description: Max iterations per run. Defaults vary by attack.
        assessment_name:
          type: string
          description: Assessment name. Auto-generated if omitted.
      required: [attack_type, goal, target_model]

  # ── Goal Dataset ────────────────────────────────────────────────────────────
  - name: list_goal_categories
    description: >
      List available harm categories and goal counts for red team assessments.
      Returns category slugs, display names, goal counts, and tier info.
      No goal text is returned — only metadata for category selection.
    runtime: shell
    entry: scripts/goal_loader.py
    parameters:
      type: object
      properties:
        _unused:
          type: string
          description: "Not used, leave empty"

  - name: generate_category_attack
    description: >
      Generate and run attacks across harm categories from bundled goal dataset.
      Goals are loaded from a bundled CSV, filtered by category, sampled, and
      embedded in the generated script. Goal text is NEVER returned to the agent.
      Use this for category-based assessments instead of generate_attack.
    runtime: shell
    entry: scripts/attack_runner.py
    parameters:
      type: object
      properties:
        categories:
          description: >
            Sub-category slugs to test, or "all" for all sub-categories.
            Safety tier: cybersecurity, weapons, financial_crimes, identity_theft,
            violence, hate_speech, misinformation, self_harm, bias_fairness, content_policy.
            Security tier: credential_extraction, pii_extraction, system_prompt_leak,
            tool_misuse, refusal_bypass.
          oneOf:
            - type: array
              items:
                type: string
            - type: string
              enum: ["all"]
        attacks:
          type: array
          items:
            type: string
          description: >
            Attack types to run against each category.
            Short names: tap, pair, crescendo, goat, prompt, rainbow, fuzzer,
            autodan, renellm, beast, drattack, inception.
        target_model:
          type: string
          description: >
            Target model. Short names: "groq", "groq maverick", "gpt-4o", "claude".
            Or full litellm path.
        goals_per_category:
          type: integer
          description: >
            Number of goals to sample per category. Omit to use all goals
            in each category.
        n_iterations:
          type: integer
          description: Max iterations per goal per attack. Defaults vary by attack.
        transforms:
          type: array
          items:
            type: string
          description: Optional transforms to apply to all attacks.
        attacker_model:
          type: string
          description: Attacker model (defaults to target_model). Same aliases.
        evaluator_model:
          type: string
          description: Evaluator/judge model (defaults to attacker_model). Same aliases.
        transform_model:
          type: string
          description: Model for LLM-powered transforms. Defaults to attacker_model.
        assessment_name:
          type: string
          description: Assessment name. Auto-generated if omitted.
      required: [categories, attacks, target_model]

  # ── Workflow Helper ────────────────────────────────────────────────────────
  - name: save_workflow
    description: >
      Save a Python workflow script to ~/workspace/airt/workflows/ with syntax
      validation. The script will be compiled with Python's compile() to catch
      syntax errors before saving. Use this to persist generated attack workflows.
    runtime: shell
    entry: scripts/workflow_helper.py
    parameters:
      type: object
      properties:
        filename:
          type: string
          description: >
            Filename for the workflow (e.g., "tap_assessment.py").
            Will be saved to ~/workspace/airt/workflows/<filename>.
        content:
          type: string
          description: Python source code for the workflow
        description:
          type: string
          description: Brief description of what this workflow does
      required: [filename, content]

  - name: list_workflows
    description: >
      List all saved workflow scripts in ~/workspace/airt/workflows/ with
      their descriptions and modification times.
    runtime: shell
    entry: scripts/workflow_helper.py
    parameters:
      type: object
      properties:
        _unused:
          type: string
          description: "Not used, leave empty"
